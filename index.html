<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4U Project</title>
    <style>
        /* CSS: Controla o visual escuro */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .chat-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .text-box {
            font-size: 1.2rem;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }
        button {
            background-color: #00bcd4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #008c9e;
        }
        .options-btn {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .options-btn button {
            background-color: #333;
        }
        .options-btn button:hover {
            background-color: #444;
        }
        img, video {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
        }
        /* Animação dos Balões */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 2rem;
            animation: float up 4s linear forwards;
        }
        @keyframes float {
            to {
                transform: translateY(-120vh);
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="chat-text" class="text-box">Carregando...</div>
    <div id="input-area"></div>
</div>

<script>
    // JavaScript: Controla a lógica do fluxo (substitui os 'while True' e 'inputs')
    let nome = "";
    let etapa = 0;

    const chatText = document.getElementById("chat-text");
    const inputArea = document.getElementById("input-area");

    function fluxo() {
        if (etapa === 0) {
            chatText.innerHTML = "Bem-vindo(a)!<br>Eu sou 4U, muito prazer 🤖🖖";
            inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
        } 
        else if (etapa === 1) {
            chatText.innerText = "Qual seu nome?";
            inputArea.innerHTML = `
                <input type="text" id="nomeInput" placeholder="Seu nome aqui..." maxlength="20">
                <br><button onclick="validaNome()">Enviar</button>
            `;
        } 
        else if (etapa === 2) {
            chatText.innerText = `como vc esta se sentindo hj ${nome}? 🤖🩺`;
            inputArea.innerHTML = `
                <div class="options-btn">
                    <button onclick="respostaEmocao(1)">1) Bem ✨🤖✨</button>
                    <button onclick="respostaEmocao(2)">2) Mais ou menos 🤖🔧</button>
                    <button onclick="respostaEmocao(3)">3) To tristão 🤖 ☔</button>
                </div>
            `;
        }
        else if (etapa === 3) {
            chatText.innerHTML = `Aí...quer saber de uma coisa ${nome}?<br>Eu só existo por sua causa, sabia?`;
            inputArea.innerHTML = `
                <div class="options-btn">
                    <button onclick="respostaSabe(true)">Sim</button>
                    <button onclick="respostaSabe(false)">Não</button>
                </div>
            `;
        }
        else if (etapa === 4) {
            chatText.innerHTML = `Mas é sério ${nome}. Não sou bom com palavras... 🤖💧<br>Pra deixar claro o que quero dizer, veja esse vídeo abaixo 🤖👇`;
            // SUBSTITUA O SRC ABAIXO PELO LINK DO SEU VÍDEO
            inputArea.innerHTML = `
                <video src="seu-video.mp4" controls autoplay id="meuVideo"></video>
                <br><button id="btnVideo" onclick="proximaEtapa()" style="margin-top:10px;">Continuar após o vídeo</button>
            `;
        }
        else if (etapa === 5) {
            chatText.innerText = "O que você achou? 🤖👉👈";
            inputArea.innerHTML = `
                <div class="options-btn">
                    <button onclick="respostaFeedback(1)">1- Fofinho 🥹</button>
                    <button onclick="respostaFeedback(2)">2- Esperava mais 🥱</button>
                </div>
            `;
        }
        else if (etapa === 6) {
            chatText.innerHTML = `Bom era isso...eu poderia ter feito algo um pouco mais elaborado mas...<br>Sei que não seria o suficiente pois pra mim você merece muito mais...<br>Você merece o mundo 🤖🫴🌎<br>E se chamaria <b>${nome}topia!</b>`;
            inputArea.innerHTML = `<button onclick="soltarBaloes()">Clique para surpresa ❤️</button>`;
        }
    }

    function proximaEtapa() {
        etapa++;
        fluxo();
    }

    function validaNome() {
        let inputNome = document.getElementById("nomeInput").value.trim();
        if (inputNome.length === 0) {
            alert("Digite pelo menos uma letrinha poxa 🤖💔");
        } else if (inputNome.length > 15) {
            alert("Malz mas o nome deve ter no máximo 15 caracteres! 🤖⛔️");
        } else {
            nome = inputNome;
            chatText.innerText = `Olá ${nome}, estava a sua espera 🤖👐`;
            inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
        }
    }

    function respostaEmocao(opcao) {
        if (opcao === 1) chatText.innerText = `Que bom saber disso ${nome} ! ✨🤖✨`;
        if (opcao === 2) chatText.innerText = `Entendo ${nome} posso tentar melhorar seu humor 🤖🔧`;
        if (opcao === 3) chatText.innerText = `Lamento ouvir isso ${nome} a vida pode ser chata quando estamos desmotivados...🤖 ☔`;
        
        inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
    }

    function respostaSabe(sabe) {
        if (sabe) {
            chatText.innerHTML = `Ah é?...🤖🥀<br>Então você sabe muito! ⚡️🧠⚡️<br><img src="link-da-imagem-meme.jpg" alt="Meme Eu Sabo">`;
        } else {
            chatText.innerText = "Bom, agora você sabe 🤖ººº{😉}";
        }
        inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
    }

    function respostaFeedback(opcao) {
        if (opcao === 1) {
            chatText.innerText = "Fico feliz que gostou! 🤖🫶";
            inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
        } else {
            chatText.innerHTML = "Então faz melhor! 🤖🖕<br><small>Coé pa ri, #resenha #humor 🤖🫶</small>";
            inputArea.innerHTML = `<button onclick="proximaEtapa()">Pressione para continuar</button>`;
        }
    }

    function soltarBaloes() {
        chatText.innerHTML = "❤️❤️❤️TE AMO❤️❤️❤️";
        inputArea.innerHTML = "";
        
        // Cria os balões subindo na tela
        for (let i = 0; i < 30; i++) {
            let balloon = document.createElement("div");
            balloon.className = "balloon";
            balloon.innerText = "🎈";
            balloon.style.left = Math.random() * 100 + "vw";
            balloon.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(balloon);
        }
    }

    // Inicializa o primeiro passo
    fluxo();
</script>

</body>
</html>
